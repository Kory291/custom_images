name: Build chess-clock image based on ubuntu image

on:
  schedule:
    - cron: 0 0 * * 0
  push:
    branches:
      - main
  workflow_dispatch:

  
jobs:
  buid:
    runs-on: ubuntu-latest
    container: docker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: cd 3-player-chess-clock && docker build -t ghcr.io/kory291/3-player-chess-clock:latest .

      - name: Push Docker image
        run: |
          echo ${{ secrets.REGISTRY_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          docker push ghcr.io/kory291/3-player-chess-clock:latest
